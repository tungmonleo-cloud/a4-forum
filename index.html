<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Diễn đàn A4</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      margin-top: 40px;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    input:focus {
      border-color: #6c5ce7;
    }

    .btn-post {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-post:hover {
      background: #4e3fd1;
      transform: scale(1.03);
    }

    .post {
      background: white;
      margin-top: 15px;
      padding: 12px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .post:hover {
      transform: translateY(-3px);
    }

    .name {
      font-weight: bold;
      color: #6c5ce7;
    }

    .time {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }

    .btn-like {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 10px;
      background: #ffe0e0;
      color: #d63031;
      cursor: pointer;
    }

    .btn-like:hover {
      background: #ffb3b3;
    }

    .btn-del {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 10px;
      background: #ff7675;
      color: white;
      cursor: pointer;
    }

    .btn-del:hover {
      background: #d63031;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>💬 Diễn đàn A4</h1>

    <div class="box">
      <input id="name" placeholder="Tên của bạn" />
      <input id="text" placeholder="Nhập tin nhắn..." />
      <button class="btn-post" onclick="post()">Đăng bài</button>
    </div>

    <div id="posts"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
